spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/pet_record_test}
    username: ${TEST_DB_USERNAME:postgres}
    password: ${TEST_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration

# Dummy R2 config so the S3 beans build in tests; real R2 calls are mocked.
r2:
  account-id: test
  access-key-id: test
  secret-access-key: test
  bucket-name: test-bucket
  endpoint: https://test.r2.cloudflarestorage.com
  upload-expire-minutes: 10
  download-expire-minutes: 15
