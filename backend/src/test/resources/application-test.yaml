spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/pet_record_test}
    username: ${TEST_DB_USERNAME:postgres}
    password: ${TEST_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration
