spring:
  application:
    name: backend
  profiles:
    default: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: 1440
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    rate-limit:
      max-attempts: ${APP_AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-minutes: ${APP_AUTH_RATE_LIMIT_WINDOW_MINUTES:15}

r2:
  account-id: ${R2_ACCOUNT_ID}
  access-key-id: ${R2_ACCESS_KEY_ID}
  secret-access-key: ${R2_SECRET_ACCESS_KEY}
  bucket-name: ${R2_BUCKET_NAME}
  endpoint: ${R2_ENDPOINT}
  upload-expire-minutes: 10
  download-expire-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health
